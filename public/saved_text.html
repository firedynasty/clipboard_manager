<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Text</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Source+Serif+4:opsz,wght@8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e6;
    --paper-deep: #ebe4d4;
    --ink: #1a1714;
    --ink-soft: #4a4540;
    --ink-faint: #8a847d;
    --rule: #c9c0ad;
    --accent: #8b2e2e;
    --accent-soft: #b85c5c;
    --green: #2e6b3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(ellipse at top, rgba(255,255,255,0.4), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(139,46,46,0.04), transparent 70%);
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header.masthead {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .masthead-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .masthead-meta {
    font-family: 'Fraunces', serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    border-left: 1px solid var(--rule);
    padding-left: 1rem;
  }

  .masthead-meta span { display: block; }
  .masthead-meta span:first-child { font-weight: 600; color: var(--ink); }

  .search-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .search-bar input {
    flex: 1;
    padding: 0.7rem 1rem;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 1rem;
    border: 1px solid var(--ink);
    border-radius: 2px;
    background: rgba(255, 253, 248, 0.8);
    color: var(--ink);
    outline: none;
  }

  .search-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(139, 46, 46, 0.15);
  }

  .search-bar input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  .status-line {
    font-size: 0.85rem;
    color: var(--ink-faint);
    margin-bottom: 1rem;
    font-style: italic;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  .result-card {
    background: rgba(255, 253, 248, 0.6);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .result-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(139, 46, 46, 0.12);
  }

  .result-card .card-preview {
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    color: var(--ink-soft);
    line-height: 1.5;
    max-height: 6rem;
    overflow: hidden;
    position: relative;
  }

  .result-card .card-preview::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2rem;
    background: linear-gradient(transparent, rgba(255, 253, 248, 0.9));
  }

  .result-card .card-info {
    padding: 0.5rem 0.75rem;
    border-top: 1px solid var(--rule);
    background: var(--paper-deep);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .result-card .card-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--ink);
  }

  .result-card .card-path {
    font-size: 0.7rem;
    color: var(--ink-faint);
  }

  .copy-badge {
    font-size: 0.65rem;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .copy-badge.show {
    opacity: 1;
  }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 23, 20, 0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    max-width: 700px;
    width: 90vw;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .modal-name {
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.1rem;
  }

  .modal-path {
    color: var(--ink-faint);
    font-size: 0.8rem;
  }

  .modal-text {
    background: rgba(255, 253, 248, 0.95);
    color: var(--ink);
    padding: 1.25rem 1.5rem;
    border-radius: 4px;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.95rem;
    line-height: 1.7;
    overflow-y: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    flex: 1;
  }

  .modal-actions {
    margin-top: 0.75rem;
    display: flex;
    gap: 0.5rem;
  }

  .modal-btn {
    background: rgba(255, 255, 255, 0.15);
    border: none;
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-size: 0.85rem;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .modal-btn:hover {
    background: rgba(255, 255, 255, 0.28);
  }

  .modal-btn.copied {
    background: rgba(46, 107, 62, 0.5);
  }

  .modal-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.12);
    border: none;
    color: var(--paper);
    font-size: 1.8rem;
    padding: 0.75rem 1rem;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .modal-nav:hover {
    background: rgba(255, 255, 255, 0.25);
  }

  .modal-nav.left { left: 16px; }
  .modal-nav.right { right: 16px; }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255, 255, 255, 0.12);
    border: none;
    color: var(--paper);
    font-size: 1.4rem;
    padding: 0.5rem 0.85rem;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .modal-close:hover {
    background: rgba(255, 255, 255, 0.25);
  }

  .help {
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    background: rgba(139, 46, 46, 0.04);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .help strong {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    display: block;
    margin-bottom: 0.3rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  @media (max-width: 600px) {
    .results-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="masthead">
      <div>
        <h1 class="masthead-title">Saved <em>Text</em></h1>
      </div>
      <div class="masthead-meta">
        <span>Dropbox Notes</span>
        <span>Search &middot; Read &middot; Copy</span>
      </div>
    </header>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name or folder (e.g. career_future)..." autofocus>
    </div>

    <div class="status-line" id="statusLine">Loading saved text...</div>

    <div class="results-grid" id="resultsGrid"></div>

    <div class="modal-overlay" id="modalOverlay">
      <button class="modal-nav left" id="modalPrev">&larr;</button>
      <div class="modal-content" id="modalContent">
        <div class="modal-header">
          <div>
            <div class="modal-name" id="modalName"></div>
            <div class="modal-path" id="modalPath"></div>
          </div>
        </div>
        <div class="modal-text" id="modalText"></div>
        <div class="modal-actions">
          <button class="modal-btn" id="modalCopy">Copy to clipboard</button>
        </div>
      </div>
      <button class="modal-nav right" id="modalNext">&rarr;</button>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>

    <div class="help">
      <strong>How it works</strong>
      Type a name to search. Notes with matching names or folders are shown as cards with a preview. Click a card to view the full text and copy it to your clipboard. Use arrow keys to navigate between results.
    </div>
  </div>

<script>
(function() {
  var searchInput = document.getElementById('searchInput');
  var statusLine = document.getElementById('statusLine');
  var resultsGrid = document.getElementById('resultsGrid');
  var modalOverlay = document.getElementById('modalOverlay');
  var modalName = document.getElementById('modalName');
  var modalPath = document.getElementById('modalPath');
  var modalText = document.getElementById('modalText');
  var modalCopy = document.getElementById('modalCopy');
  var modalPrev = document.getElementById('modalPrev');
  var modalNext = document.getElementById('modalNext');
  var modalClose = document.getElementById('modalClose');

  var allNotes = [];
  var filtered = [];
  var modalIndex = -1;

  async function loadNotes() {
    try {
      var res = await fetch('/api/saved_text');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      allNotes = await res.json();
      statusLine.textContent = allNotes.length + ' note(s) loaded. Type a name to search.';
    } catch (err) {
      statusLine.textContent = 'Error loading notes: ' + err.message;
    }
  }

  function truncate(text, len) {
    if (text.length <= len) return text;
    return text.substring(0, len) + '...';
  }

  function filterAndRender() {
    var q = searchInput.value.trim().toLowerCase();
    resultsGrid.innerHTML = '';

    if (!q) {
      filtered = [];
      if (allNotes.length) {
        statusLine.textContent = allNotes.length + ' note(s) loaded. Type a name to search.';
      }
      return;
    }

    filtered = allNotes.filter(function(note) {
      return note.name.toLowerCase().includes(q) ||
             note.folder.toLowerCase().includes(q) ||
             note.path.toLowerCase().includes(q);
    });

    statusLine.textContent = filtered.length + ' result(s) for \u201c' + searchInput.value.trim() + '\u201d';

    filtered.forEach(function(note, idx) {
      var card = document.createElement('div');
      card.className = 'result-card';

      var preview = document.createElement('div');
      preview.className = 'card-preview';
      preview.textContent = truncate(note.content, 200);

      var info = document.createElement('div');
      info.className = 'card-info';

      var left = document.createElement('div');
      var nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = note.name;
      var pathEl = document.createElement('div');
      pathEl.className = 'card-path';
      pathEl.textContent = note.folder + '/' + note.file;
      left.appendChild(nameEl);
      left.appendChild(pathEl);

      var badge = document.createElement('div');
      badge.className = 'copy-badge';
      badge.textContent = 'Copied';
      badge.id = 'badge-' + idx;

      info.appendChild(left);
      info.appendChild(badge);

      card.appendChild(preview);
      card.appendChild(info);

      card.addEventListener('click', function() {
        openModal(idx);
      });

      resultsGrid.appendChild(card);
    });

    // If exactly one result, auto-copy
    if (filtered.length === 1) {
      copyToClipboard(filtered[0].content);
      var badge = document.getElementById('badge-0');
      if (badge) {
        badge.classList.add('show');
        setTimeout(function() { badge.classList.remove('show'); }, 1500);
      }
      statusLine.textContent = '1 result \u2014 copied to clipboard!';
    }
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
  }

  // Modal
  function openModal(idx) {
    if (!filtered.length) return;
    modalIndex = idx;
    updateModal();
    modalOverlay.classList.add('active');
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    modalIndex = -1;
  }

  function updateModal() {
    if (modalIndex < 0 || modalIndex >= filtered.length) return;
    var note = filtered[modalIndex];
    modalName.textContent = note.name;
    var counter = filtered.length > 1 ? ' \u2014 ' + (modalIndex + 1) + ' / ' + filtered.length : '';
    modalPath.textContent = note.folder + '/' + note.file + counter;
    modalText.textContent = note.content;
    modalCopy.textContent = 'Copy to clipboard';
    modalCopy.classList.remove('copied');

    var showNav = filtered.length > 1;
    modalPrev.style.display = showNav ? '' : 'none';
    modalNext.style.display = showNav ? '' : 'none';
  }

  function modalGo(delta) {
    if (!filtered.length) return;
    modalIndex = (modalIndex + delta + filtered.length) % filtered.length;
    updateModal();
  }

  // Events
  searchInput.addEventListener('input', filterAndRender);

  modalCopy.addEventListener('click', function(e) {
    e.stopPropagation();
    if (modalIndex >= 0 && modalIndex < filtered.length) {
      copyToClipboard(filtered[modalIndex].content);
      modalCopy.textContent = 'Copied!';
      modalCopy.classList.add('copied');
      setTimeout(function() {
        modalCopy.textContent = 'Copy to clipboard';
        modalCopy.classList.remove('copied');
      }, 1500);
    }
  });

  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) closeModal();
  });
  modalPrev.addEventListener('click', function(e) { e.stopPropagation(); modalGo(-1); });
  modalNext.addEventListener('click', function(e) { e.stopPropagation(); modalGo(1); });

  document.addEventListener('keydown', function(e) {
    if (modalIndex < 0) return;
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowLeft') modalGo(-1);
    else if (e.key === 'ArrowRight') modalGo(1);
  });

  loadNotes();
})();
</script>
</body>
</html>
