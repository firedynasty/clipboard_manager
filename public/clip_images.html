<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Images</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Source+Serif+4:opsz,wght@8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e6;
    --paper-deep: #ebe4d4;
    --ink: #1a1714;
    --ink-soft: #4a4540;
    --ink-faint: #8a847d;
    --rule: #c9c0ad;
    --accent: #8b2e2e;
    --accent-soft: #b85c5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(ellipse at top, rgba(255,255,255,0.4), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(139,46,46,0.04), transparent 70%);
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header.masthead {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .masthead-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .masthead-meta {
    font-family: 'Fraunces', serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    border-left: 1px solid var(--rule);
    padding-left: 1rem;
  }

  .masthead-meta span { display: block; }
  .masthead-meta span:first-child { font-weight: 600; color: var(--ink); }

  .actions-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .btn {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 0.55rem 1.1rem;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .btn.primary {
    background: var(--ink);
    color: var(--paper);
  }

  .btn.primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .btn.danger {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.danger:hover {
    background: var(--accent);
    color: var(--paper);
  }

  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .slot {
    background: rgba(255, 253, 248, 0.6);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .slot-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-deep);
  }

  .slot-label {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
  }

  .slot-label::before {
    content: "\A7  ";
    color: var(--accent);
    font-weight: 400;
  }

  .slot-actions {
    display: flex;
    gap: 0.35rem;
  }

  .btn-mini {
    padding: 0.25rem 0.6rem;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    font-family: 'Fraunces', serif;
    font-weight: 500;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn-mini:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--paper);
  }

  .btn-mini.danger {
    background: var(--paper);
    color: var(--accent);
    border-color: var(--accent);
  }

  .btn-mini.danger:hover {
    background: var(--accent);
    color: var(--paper);
  }

  .slot-body {
    position: relative;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .slot-body.has-image {
    cursor: default;
  }

  .slot-body img {
    width: 100%;
    display: block;
    object-fit: contain;
    max-height: 400px;
  }

  .slot-empty {
    text-align: center;
    color: var(--ink-faint);
    font-style: italic;
    padding: 2rem 1rem;
  }

  .slot-empty-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    opacity: 0.4;
  }

  .slot-empty-text {
    font-size: 0.85rem;
  }

  .slot-loading {
    text-align: center;
    color: var(--ink-faint);
    padding: 2rem;
  }

  .slot-loading::after {
    content: '';
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 0.5rem;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .slot input[type="file"] {
    display: none;
  }

  /* Expanded image overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 23, 20, 0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .overlay.active {
    display: flex;
  }

  .overlay img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
    border-radius: 4px;
  }

  .help {
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    background: rgba(139, 46, 46, 0.04);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .help strong {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    display: block;
    margin-bottom: 0.3rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  @media (max-width: 600px) {
    .slots-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="masthead">
      <div>
        <h1 class="masthead-title">Clip <em>Images</em></h1>
      </div>
      <div class="masthead-meta">
        <span>Phone to Laptop</span>
        <span>Upload &middot; View &middot; Replace</span>
      </div>
    </header>

    <div class="actions-bar">
      <button class="btn primary" id="refreshAll">Refresh All</button>
      <button class="btn danger" id="clearAll">Clear All</button>
    </div>

    <div class="slots-grid" id="slotsGrid"></div>

    <div class="overlay" id="overlay">
      <img id="overlayImg" src="" alt="Expanded">
    </div>

    <div class="help">
      <strong>How it works</strong>
      Upload images from your phone and view them on your laptop. Each slot has a fixed name &mdash; uploading a new image to the same slot replaces the previous one. Click an image to view it full-screen. Images are stored on Cloudinary.
    </div>
  </div>

<script>
  const CLOUD_NAME = 'dq28i47kr';
  const UPLOAD_PRESET = 'clipboard_manager';
  const SLOT_COUNT = 5;
  const SLOT_PREFIX = 'clipboard_slot_';

  const grid = document.getElementById('slotsGrid');
  const overlay = document.getElementById('overlay');
  const overlayImg = document.getElementById('overlayImg');

  // Close overlay on click
  overlay.addEventListener('click', () => {
    overlay.classList.remove('active');
    overlayImg.src = '';
  });

  // Build slot elements
  const slots = [];
  for (let i = 0; i < SLOT_COUNT; i++) {
    const slotId = SLOT_PREFIX + (i + 1);
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.innerHTML = `
      <div class="slot-header">
        <span class="slot-label">Slot ${i + 1}</span>
        <div class="slot-actions">
          <button class="btn-mini upload-btn" data-slot="${i}">Upload</button>
          <button class="btn-mini danger clear-btn" data-slot="${i}">Clear</button>
        </div>
      </div>
      <div class="slot-body" data-slot="${i}">
        <div class="slot-empty">
          <div class="slot-empty-icon">+</div>
          <div class="slot-empty-text">Tap to upload</div>
        </div>
      </div>
      <input type="file" accept="image/*" data-slot="${i}">
    `;
    grid.appendChild(slot);
    slots.push({
      el: slot,
      id: slotId,
      url: null,
      body: slot.querySelector('.slot-body'),
      fileInput: slot.querySelector('input[type="file"]'),
    });
  }

  // Tap empty slot body to trigger upload
  slots.forEach((s, i) => {
    s.body.addEventListener('click', () => {
      if (!s.url) s.fileInput.click();
    });
  });

  // Upload button
  document.querySelectorAll('.upload-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.slot);
      slots[i].fileInput.click();
    });
  });

  // Clear button
  document.querySelectorAll('.clear-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.slot);
      slots[i].url = null;
      renderSlot(i);
    });
  });

  // File input change -> upload
  slots.forEach((s, i) => {
    s.fileInput.addEventListener('change', () => {
      const file = s.fileInput.files[0];
      if (!file) return;
      uploadImage(i, file);
      s.fileInput.value = '';
    });
  });

  function renderSlot(i) {
    const s = slots[i];
    if (s.loading) {
      s.body.innerHTML = '<div class="slot-loading">Uploading</div>';
      s.body.classList.remove('has-image');
      return;
    }
    if (s.url) {
      s.body.innerHTML = `<img src="${s.url}" alt="Slot ${i + 1}">`;
      s.body.classList.add('has-image');
      // Click image to expand
      s.body.querySelector('img').addEventListener('click', () => {
        overlayImg.src = s.url;
        overlay.classList.add('active');
      });
    } else {
      s.body.innerHTML = `
        <div class="slot-empty">
          <div class="slot-empty-icon">+</div>
          <div class="slot-empty-text">Tap to upload</div>
        </div>
      `;
      s.body.classList.remove('has-image');
    }
  }

  async function uploadImage(i, file) {
    const s = slots[i];
    s.loading = true;
    renderSlot(i);

    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('public_id', s.id);

    try {
      const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
        { method: 'POST', body: formData }
      );
      const data = await res.json();
      if (data.secure_url) {
        // Append timestamp to bust cache
        s.url = data.secure_url + '?t=' + Date.now();
      } else {
        alert('Upload failed: ' + (data.error?.message || 'Unknown error'));
      }
    } catch (err) {
      alert('Upload failed: ' + err.message);
    }

    s.loading = false;
    renderSlot(i);
  }

  function loadSlot(i) {
    const s = slots[i];
    // Try loading the image by constructing the Cloudinary URL
    const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${s.id}`;
    const img = new Image();
    img.onload = () => {
      s.url = url + '?t=' + Date.now();
      renderSlot(i);
    };
    img.onerror = () => {
      // No image in this slot
      s.url = null;
      renderSlot(i);
    };
    img.src = url + '?t=' + Date.now();
  }

  // Refresh all
  document.getElementById('refreshAll').addEventListener('click', () => {
    for (let i = 0; i < SLOT_COUNT; i++) loadSlot(i);
  });

  // Clear all
  document.getElementById('clearAll').addEventListener('click', () => {
    slots.forEach((s, i) => {
      s.url = null;
      renderSlot(i);
    });
  });

  // Load all on startup
  for (let i = 0; i < SLOT_COUNT; i++) loadSlot(i);
</script>
</body>
</html>
