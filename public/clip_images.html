<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Images</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Source+Serif+4:opsz,wght@8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e6;
    --paper-deep: #ebe4d4;
    --ink: #1a1714;
    --ink-soft: #4a4540;
    --ink-faint: #8a847d;
    --rule: #c9c0ad;
    --accent: #8b2e2e;
    --accent-soft: #b85c5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(ellipse at top, rgba(255,255,255,0.4), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(139,46,46,0.04), transparent 70%);
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header.masthead {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .masthead-title {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .masthead-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .masthead-meta {
    font-family: 'Fraunces', serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    border-left: 1px solid var(--rule);
    padding-left: 1rem;
  }

  .masthead-meta span { display: block; }
  .masthead-meta span:first-child { font-weight: 600; color: var(--ink); }

  .actions-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .btn {
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 0.55rem 1.1rem;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .btn.primary {
    background: var(--ink);
    color: var(--paper);
  }

  .btn.primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .btn.danger {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.danger:hover {
    background: var(--accent);
    color: var(--paper);
  }

  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .slot {
    background: rgba(255, 253, 248, 0.6);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .slot-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-deep);
  }

  .slot-label {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
  }

  .slot-label::before {
    content: "\A7  ";
    color: var(--accent);
    font-weight: 400;
  }

  .slot-actions {
    display: flex;
    gap: 0.35rem;
  }

  .btn-mini {
    padding: 0.25rem 0.6rem;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    font-family: 'Fraunces', serif;
    font-weight: 500;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .btn-mini:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--paper);
  }

  .btn-mini.danger {
    background: var(--paper);
    color: var(--accent);
    border-color: var(--accent);
  }

  .btn-mini.danger:hover {
    background: var(--accent);
    color: var(--paper);
  }

  .slot-body {
    position: relative;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .slot-body.has-image {
    cursor: default;
  }

  .slot-body img {
    width: 100%;
    display: block;
    object-fit: contain;
    max-height: 400px;
  }

  .slot-empty {
    text-align: center;
    color: var(--ink-faint);
    font-style: italic;
    padding: 2rem 1rem;
  }

  .slot-empty-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    opacity: 0.4;
  }

  .slot-empty-text {
    font-size: 0.85rem;
  }

  .slot-loading {
    text-align: center;
    color: var(--ink-faint);
    padding: 2rem;
  }

  .slot-loading::after {
    content: '';
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 0.5rem;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .slot input[type="file"] {
    display: none;
  }

  /* Expanded image overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 23, 20, 0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .overlay.active {
    display: flex;
  }

  .overlay img {
    max-width: 65vw;
    max-height: 65vh;
    object-fit: contain;
    border-radius: 4px;
  }

  .help {
    margin-top: 1.5rem;
    padding: 1rem 1.25rem;
    background: rgba(139, 46, 46, 0.04);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .help strong {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    display: block;
    margin-bottom: 0.3rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  @media (max-width: 600px) {
    .slots-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="masthead">
      <div>
        <h1 class="masthead-title">Clip <em>Images</em></h1>
      </div>
      <div class="masthead-meta">
        <span>Phone to Laptop</span>
        <span>Upload &middot; View &middot; Replace</span>
      </div>
    </header>

    <div class="actions-bar">
      <button class="btn primary" id="refreshAll">Refresh All</button>
      <button class="btn danger" id="clearAll">Clear All</button>
      <button class="btn" id="dbxBtn">DB: Sign In</button>
    </div>

    <div class="slots-grid" id="slotsGrid"></div>

    <div class="overlay" id="overlay">
      <img id="overlayImg" src="" alt="Expanded">
    </div>

    <div class="help">
      <strong>How it works</strong>
      Upload images from your phone and view them on your laptop. Sign in to Dropbox to sync slots across devices. Each upload creates a new Cloudinary image and saves the URL to Dropbox. Click an image to view it full-screen.
    </div>
  </div>

<!-- Dropbox Integration -->
<script>
(function() {
    let dropboxAccessToken = null;
    let dropboxAppKey = '';
    const dbxIsLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);

    function generateCodeVerifier() {
        const array = new Uint8Array(64);
        crypto.getRandomValues(array);
        return btoa(String.fromCharCode(...array))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
        const encoder = new TextEncoder();
        const data = encoder.encode(verifier);
        const digest = await crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(digest)))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function fetchDropboxAppKey() {
        if (dbxIsLocalhost) {
            return localStorage.getItem('dropbox-app-key') || '';
        }
        try {
            const res = await fetch('/api/dropbox-key');
            const data = await res.json();
            return data.key || '';
        } catch {
            return '';
        }
    }

    window.getDropboxAccessToken = function() { return dropboxAccessToken; };

    window.dropboxDownloadFile = async function(path) {
        if (!dropboxAccessToken) return null;
        const response = await fetch('https://content.dropboxapi.com/2/files/download', {
            method: 'POST',
            headers: {
                Authorization: 'Bearer ' + dropboxAccessToken,
                'Dropbox-API-Arg': JSON.stringify({ path: path }),
            },
        });
        if (!response.ok) {
            if (response.status === 409) return null;
            throw new Error('Download failed');
        }
        return await response.text();
    };

    window.dropboxUploadFile = async function(path, content) {
        if (!dropboxAccessToken) throw new Error('Not signed into Dropbox');
        const response = await fetch('https://content.dropboxapi.com/2/files/upload', {
            method: 'POST',
            headers: {
                Authorization: 'Bearer ' + dropboxAccessToken,
                'Dropbox-API-Arg': JSON.stringify({
                    path: path, mode: { '.tag': 'overwrite' }, mute: true,
                }),
                'Content-Type': 'application/octet-stream',
            },
            body: content,
        });
        if (!response.ok) throw new Error('Upload failed');
        return true;
    };

    window.dropboxSignIn = async function() {
        let appKey;
        if (dbxIsLocalhost) {
            appKey = prompt('Enter your Dropbox App Key:');
            if (!appKey) return;
            localStorage.setItem('dropbox-app-key', appKey);
        } else {
            appKey = await fetchDropboxAppKey();
            if (!appKey) { alert('Dropbox App Key not configured on server'); return; }
        }
        dropboxAppKey = appKey;

        const verifier = generateCodeVerifier();
        const challenge = await generateCodeChallenge(verifier);
        sessionStorage.setItem('dropbox_code_verifier', verifier);

        const redirectUri = window.location.origin + window.location.pathname;
        const authUrl = 'https://www.dropbox.com/oauth2/authorize?client_id=' + appKey
            + '&response_type=code&code_challenge=' + challenge
            + '&code_challenge_method=S256&redirect_uri=' + encodeURIComponent(redirectUri)
            + '&token_access_type=online';
        window.location.href = authUrl;
    };

    window.dropboxSignOut = async function() {
        if (dropboxAccessToken) {
            try {
                await fetch('https://api.dropboxapi.com/2/auth/token/revoke', {
                    method: 'POST',
                    headers: { Authorization: 'Bearer ' + dropboxAccessToken },
                });
            } catch {}
        }
        dropboxAccessToken = null;
    };

    window._dropboxReady = (async function() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (!code) return;

        const verifier = sessionStorage.getItem('dropbox_code_verifier');
        const appKey = await fetchDropboxAppKey();
        if (!verifier || !appKey) return;
        dropboxAppKey = appKey;

        const redirectUri = window.location.origin + window.location.pathname;
        const body = new URLSearchParams({
            code,
            grant_type: 'authorization_code',
            client_id: appKey,
            redirect_uri: redirectUri,
            code_verifier: verifier,
        });

        try {
            const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString(),
            });
            const data = await res.json();
            if (data.access_token) {
                dropboxAccessToken = data.access_token;
                sessionStorage.removeItem('dropbox_code_verifier');
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        } catch (err) {
            console.error('Dropbox auth error:', err);
        }
    })();
})();
</script>

<script>
  const CLOUD_NAME = 'dq28i47kr';
  const UPLOAD_PRESET = 'clipboard_manager';
  const SLOT_COUNT = 5;
  const SLOT_PREFIX = 'clipboard_slot_';
  const SLOTS_DROPBOX_PATH = '/vercel/cloudinary_list.json';

  const grid = document.getElementById('slotsGrid');
  const overlay = document.getElementById('overlay');
  const overlayImg = document.getElementById('overlayImg');
  const dbxBtn = document.getElementById('dbxBtn');

  // Close overlay on click
  overlay.addEventListener('click', () => {
    overlay.classList.remove('active');
    overlayImg.src = '';
  });

  // Build slot elements
  const slots = [];
  for (let i = 0; i < SLOT_COUNT; i++) {
    const slotId = SLOT_PREFIX + (i + 1);
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.innerHTML = `
      <div class="slot-header">
        <span class="slot-label">Slot ${i + 1}</span>
        <div class="slot-actions">
          <button class="btn-mini upload-btn" data-slot="${i}">Upload</button>
          <button class="btn-mini save-btn" data-slot="${i}" style="display:none;">Save</button>
          <button class="btn-mini danger clear-btn" data-slot="${i}">Clear</button>
        </div>
      </div>
      <div class="slot-body" data-slot="${i}">
        <div class="slot-empty">
          <div class="slot-empty-icon">+</div>
          <div class="slot-empty-text">Tap to upload</div>
        </div>
      </div>
      <input type="file" accept="image/*" data-slot="${i}">
    `;
    grid.appendChild(slot);
    slots.push({
      el: slot,
      id: slotId,
      url: null,
      body: slot.querySelector('.slot-body'),
      fileInput: slot.querySelector('input[type="file"]'),
      saveBtn: slot.querySelector('.save-btn'),
    });
  }

  // Tap empty slot body to trigger upload
  slots.forEach((s, i) => {
    s.body.addEventListener('click', () => {
      if (!s.url) s.fileInput.click();
    });
  });

  // Upload button
  document.querySelectorAll('.upload-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.slot);
      slots[i].fileInput.click();
    });
  });

  // Save button - download image as file
  document.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const i = parseInt(btn.dataset.slot);
      const s = slots[i];
      if (!s.url) return;
      try {
        const res = await fetch(s.url);
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = s.id + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
      } catch (err) {
        alert('Failed to save image: ' + err.message);
      }
    });
  });

  // Clear button
  document.querySelectorAll('.clear-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const i = parseInt(btn.dataset.slot);
      slots[i].url = null;
      renderSlot(i);
      await saveSlotUrls();
    });
  });

  // File input change -> upload
  slots.forEach((s, i) => {
    s.fileInput.addEventListener('change', () => {
      const file = s.fileInput.files[0];
      if (!file) return;
      uploadImage(i, file);
      s.fileInput.value = '';
    });
  });

  function renderSlot(i) {
    const s = slots[i];
    if (s.loading) {
      s.body.innerHTML = '<div class="slot-loading">Uploading</div>';
      s.body.classList.remove('has-image');
      s.saveBtn.style.display = 'none';
      return;
    }
    if (s.url) {
      s.body.innerHTML = `<img src="${s.url}" alt="Slot ${i + 1}">`;
      s.body.classList.add('has-image');
      s.saveBtn.style.display = '';
      // Click image to expand
      s.body.querySelector('img').addEventListener('click', () => {
        overlayImg.src = s.url;
        overlay.classList.add('active');
      });
    } else {
      s.body.innerHTML = `
        <div class="slot-empty">
          <div class="slot-empty-icon">+</div>
          <div class="slot-empty-text">Tap to upload</div>
        </div>
      `;
      s.body.classList.remove('has-image');
      s.saveBtn.style.display = 'none';
    }
  }

  // --- Dropbox slot URL persistence ---

  async function saveSlotUrls() {
    if (!window.getDropboxAccessToken || !window.getDropboxAccessToken()) return;
    const mapping = {};
    slots.forEach(s => { if (s.url) mapping[s.id] = s.url; });
    try {
      await window.dropboxUploadFile(SLOTS_DROPBOX_PATH, JSON.stringify(mapping));
    } catch (err) {
      console.error('Failed to save slot URLs to Dropbox:', err);
    }
  }

  async function loadSlotUrls() {
    if (!window.getDropboxAccessToken || !window.getDropboxAccessToken()) return;
    try {
      const text = await window.dropboxDownloadFile(SLOTS_DROPBOX_PATH);
      if (!text) return;
      const mapping = JSON.parse(text);
      slots.forEach((s, i) => {
        if (mapping[s.id]) {
          s.url = mapping[s.id];
          renderSlot(i);
        }
      });
    } catch (err) {
      console.error('Failed to load slot URLs from Dropbox:', err);
    }
  }

  // --- Dropbox UI ---

  function updateDbxBtn() {
    const signedIn = !!(window.getDropboxAccessToken && window.getDropboxAccessToken());
    dbxBtn.textContent = signedIn ? 'DB: Load' : 'DB: Sign In';
    dbxBtn.title = signedIn ? 'Click to load. Right-click to sign out.' : 'Sign in to Dropbox';
  }

  dbxBtn.addEventListener('click', async () => {
    const signedIn = !!(window.getDropboxAccessToken && window.getDropboxAccessToken());
    if (signedIn) {
      await loadSlotUrls();
    } else {
      window.dropboxSignIn();
    }
  });

  dbxBtn.addEventListener('contextmenu', async (e) => {
    const signedIn = !!(window.getDropboxAccessToken && window.getDropboxAccessToken());
    if (signedIn) {
      e.preventDefault();
      await window.dropboxSignOut();
      updateDbxBtn();
    }
  });

  // Client-side image compression (works on mobile + desktop)
  function compressImage(file, maxBytes = 2 * 1024 * 1024) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let w = img.width;
        let h = img.height;

        let quality = 0.8;

        function tryCompress() {
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob((result) => {
            if (result.size <= maxBytes || w < 200) {
              resolve(result);
            } else if (quality > 0.4) {
              quality -= 0.15;
              canvas.toBlob((r2) => {
                if (r2.size <= maxBytes) {
                  resolve(r2);
                } else {
                  w = Math.round(w * 0.85);
                  h = Math.round(h * 0.85);
                  quality = 0.7;
                  tryCompress();
                }
              }, 'image/jpeg', quality);
            } else {
              w = Math.round(w * 0.85);
              h = Math.round(h * 0.85);
              quality = 0.7;
              tryCompress();
            }
          }, 'image/jpeg', quality);
        }

        tryCompress();
      };
      img.src = URL.createObjectURL(file);
    });
  }

  async function uploadImage(i, file) {
    const s = slots[i];
    s.loading = true;
    renderSlot(i);

    // Compress before uploading
    const compressed = await compressImage(file);

    // Use a unique public_id each time (unsigned presets can't overwrite)
    const uniqueId = s.id + '_' + Date.now();
    const formData = new FormData();
    formData.append('file', compressed, 'image.jpg');
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('public_id', uniqueId);

    try {
      const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
        { method: 'POST', body: formData }
      );
      const data = await res.json();
      if (data.secure_url) {
        s.url = data.secure_url;
        // Save URL mapping to Dropbox for cross-device sync
        await saveSlotUrls();
      } else {
        alert('Upload failed: ' + (data.error?.message || 'Unknown error'));
      }
    } catch (err) {
      alert('Upload failed: ' + err.message);
    }

    s.loading = false;
    renderSlot(i);
  }

  // Fallback: try loading from fixed Cloudinary public_id (for existing slots)
  function loadSlotFallback(i) {
    const s = slots[i];
    const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${s.id}`;
    const img = new Image();
    img.onload = () => {
      s.url = url + '?t=' + Date.now();
      renderSlot(i);
    };
    img.onerror = () => {
      s.url = null;
      renderSlot(i);
    };
    img.src = url + '?t=' + Date.now();
  }

  // Refresh all
  document.getElementById('refreshAll').addEventListener('click', async () => {
    const signedIn = !!(window.getDropboxAccessToken && window.getDropboxAccessToken());
    if (signedIn) {
      await loadSlotUrls();
    } else {
      for (let i = 0; i < SLOT_COUNT; i++) loadSlotFallback(i);
    }
  });

  // Clear all
  document.getElementById('clearAll').addEventListener('click', async () => {
    slots.forEach((s, i) => {
      s.url = null;
      renderSlot(i);
    });
    await saveSlotUrls();
  });

  // Load on startup
  (async function init() {
    if (window._dropboxReady) await window._dropboxReady;
    updateDbxBtn();
    const signedIn = !!(window.getDropboxAccessToken && window.getDropboxAccessToken());
    if (signedIn) {
      await loadSlotUrls();
    } else {
      // Fallback to fixed Cloudinary URLs
      for (let i = 0; i < SLOT_COUNT; i++) loadSlotFallback(i);
    }
  })();
</script>
</body>
</html>
